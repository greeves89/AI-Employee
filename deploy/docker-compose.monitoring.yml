# Monitoring stack: Prometheus, Grafana, Loki, exporters
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
#
# Access:
#   Grafana:    http://localhost:3001  (admin/admin on first boot)
#   Prometheus: http://localhost:9090
#   Loki:       http://localhost:3100  (internal, accessed via Grafana)
#
# In production, add Traefik labels for HTTPS access and disable direct port bindings.

services:
  prometheus:
    image: prom/prometheus:v3.2.0
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_FEATURE_TOGGLES_ENABLE: "lokiLogsDataplane"
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - internal
    depends_on:
      - prometheus
      - loki
    deploy:
      resources:
        limits:
          memory: 256M

  loki:
    image: grafana/loki:3.3.2
    restart: unless-stopped
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/tmp/loki
    command: -config.file=/etc/loki/config.yml
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256M

  promtail:
    image: grafana/promtail:3.3.2
    restart: unless-stopped
    volumes:
      - ./monitoring/loki/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - internal
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          memory: 128M

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 32M

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 128M

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_employee}?sslmode=disable"
    networks:
      - internal
    depends_on:
      - postgres
    deploy:
      resources:
        limits:
          memory: 32M

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis:6379"
    networks:
      - internal
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 32M

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
