services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-employee-postgres
    environment:
      POSTGRES_DB: ai_employee
      POSTGRES_USER: ai_employee
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    # No host port binding - only accessible via internal network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_employee"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: ai-employee-redis
    # No host port binding - only accessible via internal network
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - internal
      - agent-network

  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
      target: base
    container_name: ai-employee-orchestrator
    ports:
      - "${ORCHESTRATOR_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://ai_employee:${DB_PASSWORD:-devpassword}@postgres:5432/ai_employee
      REDIS_URL: redis://redis:6379
      REDIS_URL_INTERNAL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-claude-sonnet-4-5-20250929}
      MAX_TURNS: ${MAX_TURNS:-100}
      MAX_AGENTS: ${MAX_AGENTS:-10}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID:-}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET:-}
      OAUTH_MICROSOFT_CLIENT_ID: ${OAUTH_MICROSOFT_CLIENT_ID:-}
      OAUTH_MICROSOFT_CLIENT_SECRET: ${OAUTH_MICROSOFT_CLIENT_SECRET:-}
      OAUTH_APPLE_CLIENT_ID: ${OAUTH_APPLE_CLIENT_ID:-}
      OAUTH_APPLE_TEAM_ID: ${OAUTH_APPLE_TEAM_ID:-}
      OAUTH_APPLE_KEY_ID: ${OAUTH_APPLE_KEY_ID:-}
      OAUTH_APPLE_PRIVATE_KEY: ${OAUTH_APPLE_PRIVATE_KEY:-}
      OAUTH_REDIRECT_BASE_URL: ${OAUTH_REDIRECT_BASE_URL:-http://localhost:8000}
      API_SECRET_KEY: ${API_SECRET_KEY:-change-me-in-production}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-}
      AGENT_IMAGE: ai-employee-agent:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./orchestrator:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - agent-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    container_name: ai-employee-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - orchestrator
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - internal
      - agent-network

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
  agent-network:
    name: ai-employee-network
    driver: bridge
