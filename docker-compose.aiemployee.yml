services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-employee-postgres
    environment:
      POSTGRES_DB: ai_employee
      POSTGRES_USER: ai_employee
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    command: 'postgres -c max_connections=250 -c shared_buffers=256MB -c work_mem=8MB
      -c effective_cache_size=512MB

      '
    volumes:
    - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ai_employee
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
    - internal
  redis:
    image: redis:7-alpine
    container_name: ai-employee-redis
    volumes:
    - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy volatile-lru
      --requirepass ${REDIS_PASSWORD:-changeme-redis-password}
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
    - internal
    - agent-network
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: ai-employee-docker-proxy
    environment:
      CONTAINERS: 1
      IMAGES: 1
      VOLUMES: 1
      NETWORKS: 1
      EXEC: 1
      POST: 1
      AUTH: 0
      SECRETS: 0
      SWARM: 0
      SERVICES: 0
      TASKS: 0
      NODES: 0
      PLUGINS: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      SESSION: 0
      SYSTEM: 0
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
    - internal
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
      target: base
    container_name: ai-employee-orchestrator
    ports:
    - '8000'
    environment:
      DATABASE_URL: postgresql+asyncpg://ai_employee:${DB_PASSWORD:-devpassword}@postgres:5432/ai_employee
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme-redis-password}@redis:6379
      REDIS_URL_INTERNAL: redis://:${REDIS_PASSWORD:-changeme-redis-password}@ai-employee-redis:6379
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      FEEDBACK_WEBHOOK_URL: ${FEEDBACK_WEBHOOK_URL:-}
      FEEDBACK_WEBHOOK_API_KEY: ${FEEDBACK_WEBHOOK_API_KEY:-}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      CLAUDE_CODE_OAUTH_REFRESH_TOKEN: ${CLAUDE_CODE_OAUTH_REFRESH_TOKEN:-}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-claude-sonnet-4-6}
      MAX_TURNS: ${MAX_TURNS:-100}
      MAX_AGENTS: ${MAX_AGENTS:-10}
      EXTENDED_THINKING: ${EXTENDED_THINKING:-true}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID:-}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET:-}
      OAUTH_MICROSOFT_CLIENT_ID: ${OAUTH_MICROSOFT_CLIENT_ID:-}
      OAUTH_MICROSOFT_CLIENT_SECRET: ${OAUTH_MICROSOFT_CLIENT_SECRET:-}
      OAUTH_APPLE_CLIENT_ID: ${OAUTH_APPLE_CLIENT_ID:-}
      OAUTH_APPLE_TEAM_ID: ${OAUTH_APPLE_TEAM_ID:-}
      OAUTH_APPLE_KEY_ID: ${OAUTH_APPLE_KEY_ID:-}
      OAUTH_APPLE_PRIVATE_KEY: ${OAUTH_APPLE_PRIVATE_KEY:-}
      OAUTH_REDIRECT_BASE_URL: ${OAUTH_REDIRECT_BASE_URL:-http://localhost:8000}
      API_SECRET_KEY: ${API_SECRET_KEY:-change-me-in-production}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-}
      AGENT_IMAGE: ai-employee-agent:latest
      KIOSK_VOICE_ENABLED: ${KIOSK_VOICE_ENABLED:-}
      KIOSK_ENABLED: ${KIOSK_ENABLED:-false}
      MAX_PARALLEL_CHATS: ${MAX_PARALLEL_CHATS:-1}
      MAX_PARALLEL_TASKS: ${MAX_PARALLEL_TASKS:-1}
      AGENT_MOUNT_CATALOG: ${AGENT_MOUNT_CATALOG:-}
    volumes:
    - ./orchestrator:/app
    - ./VERSION:/VERSION:ro
    - ./CHANGELOG.md:/CHANGELOG.md:ro
    - ai-employee-shared:/shared
    - ${HOME}/.ai-employee:/host-auth:ro
    - ${SECONDBRAIN_BASE:-/srv/secondbrain}:/srv/secondbrain
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
    restart: unless-stopped
    networks:
    - internal
    - agent-network
  embedding-service:
    build:
      context: ./embedding-service
      dockerfile: Dockerfile
    container_name: ai-employee-embedding
    volumes:
    - embedding_models:/models
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 3G
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8001/healthz
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    networks:
    - internal
  stt-service:
    build:
      context: ./stt-service
      dockerfile: Dockerfile
    container_name: ai-employee-stt
    volumes:
    - stt_models:/models
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8003/healthz
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
    - internal
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    container_name: ai-employee-frontend
    ports:
    - '3000'
    depends_on:
    - orchestrator
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
    - internal
    - agent-network
  caddy:
    image: caddy:2-alpine
    container_name: ai-employee-caddy
    volumes:
    - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
    - orchestrator
    - frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
    - internal
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ai-employee-cloudflared
    command: tunnel --protocol http2 --edge-ip-version auto --retries 10 --grace-period
      60s run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
      TUNNEL_METRICS: 0.0.0.0:20241
      NO_AUTOUPDATE: 'true'
    depends_on:
    - caddy
    restart: unless-stopped
    stop_grace_period: 10s
    healthcheck:
      test:
      - CMD
      - cloudflared
      - tunnel
      - --metrics
      - 127.0.0.1:20241
      - ready
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
    - autoheal=true
    profiles:
    - tunnel
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
    - internal
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: ai-employee-autoheal
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 60
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    profiles:
    - tunnel
    deploy:
      resources:
        limits:
          memory: 32M
volumes:
  postgres_data: null
  redis_data: null
  embedding_models: null
  stt_models: null
  ai-employee-shared:
    external: true
networks:
  internal:
    driver: bridge
  agent-network:
    name: ai-employee-network
    driver: bridge
