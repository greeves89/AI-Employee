# Redis Replica Configuration
# Connects to primary and stays in sync for HA failover

# Bind to all interfaces
bind 0.0.0.0
port 6379

# Enable persistence
appendonly yes
appendfsync everysec

# Memory limits
maxmemory 256mb
maxmemory-policy allkeys-lru

# Replica configuration - points to primary
replicaof redis-primary 6379

# Announce correct hostname to sentinel (important in Docker)
# replica-announce-ip redis-replica

# Allow reads from replica (for read scaling)
replica-read-only yes

# Replica priority for promotion (lower = higher priority)
replica-priority 100
