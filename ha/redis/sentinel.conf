# Redis Sentinel Configuration
# Monitors the Redis primary and triggers failover if it becomes unavailable

# Bind to all interfaces (Docker network)
bind 0.0.0.0

# Sentinel port
port 26379

# Monitor the primary Redis instance
# sentinel monitor <name> <host> <port> <quorum>
# quorum: number of sentinels that must agree on a failure
sentinel monitor mymaster redis-primary 6379 2

# Password for connecting to Redis instances (must match Redis AUTH password)
# sentinel auth-pass mymaster ${REDIS_PASSWORD}

# Time (ms) that a server must be unreachable to be considered down
sentinel down-after-milliseconds mymaster 5000

# Number of replicas that can be simultaneously reconfigured after failover
sentinel parallel-syncs mymaster 1

# Failover timeout (ms): time sentinel waits before starting another failover
sentinel failover-timeout mymaster 30000

# Allow sentinel to announce a custom hostname (useful for Docker networking)
# sentinel announce-hostnames yes
# sentinel resolve-hostnames yes

# Logging
loglevel notice
logfile ""

# Working directory
dir /tmp
