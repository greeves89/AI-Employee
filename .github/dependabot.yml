version: 2
updates:
  # Docker base images
  - package-ecosystem: "docker"
    directory: "/orchestrator"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "docker"]

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "docker"]

  - package-ecosystem: "docker"
    directory: "/agent"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "docker"]

  - package-ecosystem: "docker"
    directory: "/embedding-service"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "docker"]

  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/orchestrator"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels: ["dependencies", "python"]
    groups:
      all-python:
        patterns: ["*"]

  - package-ecosystem: "pip"
    directory: "/agent"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "python"]

  - package-ecosystem: "pip"
    directory: "/embedding-service"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "python"]

  # Node.js dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels: ["dependencies", "javascript"]
    groups:
      # Minor + patch updates are grouped → single PR, safe to review & merge
      # Major version bumps are intentionally excluded so they get individual PRs
      # requiring a manual migration decision (Next, React, Tailwind, TS majors
      # are coordinated framework upgrades — not rubber-stampable via group PR).
      all-npm-minor:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "ci"]
