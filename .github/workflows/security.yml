name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  # ── Python dependency audit ──────────────────────────────────────
  python-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit orchestrator dependencies
        run: |
          cd orchestrator
          pip install -r requirements.txt 2>/dev/null || true
          pip-audit -r requirements.txt --desc --fix --dry-run || true
          pip-audit -r requirements.txt --format json --output ../orchestrator-audit.json || true

      - name: Audit agent dependencies
        run: |
          cd agent
          pip install -r requirements.txt 2>/dev/null || true
          pip-audit -r requirements.txt --desc || true

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-audit
          path: orchestrator-audit.json

  # ── Node.js dependency audit ─────────────────────────────────────
  node-audit:
    name: Node.js Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Audit frontend dependencies
        run: |
          cd frontend
          npm audit --audit-level=high || true
          npm audit --json > ../frontend-audit.json || true

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: node-audit
          path: frontend-audit.json

  # ── Container image scanning ─────────────────────────────────────
  container-scan:
    name: Container Image Scan (Trivy)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        context:
          - { name: orchestrator, path: ./orchestrator }
          - { name: agent, path: ./agent }
          - { name: frontend, path: ./frontend }
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.context.name }} image
        run: docker build -t scan-${{ matrix.context.name }}:local ${{ matrix.context.path }} || true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: scan-${{ matrix.context.name }}:local
          format: sarif
          output: trivy-${{ matrix.context.name }}.sarif
          severity: CRITICAL,HIGH
          exit-code: 0 # Don't fail build, just report

      - name: Upload Trivy scan to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.context.name }}.sarif
          category: trivy-${{ matrix.context.name }}

  # ── SAST — CodeQL ────────────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [python, javascript]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql-${{ matrix.language }}

  # ── Secret scanning ──────────────────────────────────────────────
  secrets-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified --results=verified
