name: Build Computer-Use Bridge

on:
  push:
    branches:
      - main
      - feat/issue-70-computer-use
    paths:
      - "computer-use-bridge/**"
      - ".github/workflows/build-bridge.yml"
      - "VERSION"
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-macos:
    name: macOS (.dmg)
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: computer-use-bridge
        run: |
          pip install pyinstaller rumps pystray \
            pyautogui Pillow websockets edge-tts \
            pyobjc-framework-AVFoundation \
            pyobjc-framework-ApplicationServices \
            pyobjc-framework-Cocoa

      - name: Set bridge artifact version
        id: bridge_version
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dmg_name=AI-Employee-Bridge-v$VERSION.dmg" >> "$GITHUB_OUTPUT"
          printf '"""Generated during the bridge release build."""\n\nBRIDGE_VERSION = "%s"\n' "$VERSION" > computer-use-bridge/_version.py

      - name: Build .app with PyInstaller
        working-directory: computer-use-bridge
        run: |
          pyinstaller bridge_macos.spec --noconfirm --clean

      - name: Check Apple signing secrets
        id: apple_signing
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
        run: |
          if [ -n "$APPLE_CERTIFICATE_P12_BASE64" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Developer ID certificate
        if: steps.apple_signing.outputs.available == 'true'
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Codesign .app
        if: steps.apple_signing.outputs.available == 'true'
        working-directory: computer-use-bridge
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --force --deep --options runtime \
            --entitlements entitlements.plist \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "dist/AI-Employee Bridge.app"
          codesign --verify --deep --strict --verbose=2 "dist/AI-Employee Bridge.app"

      - name: Create .dmg
        working-directory: computer-use-bridge
        run: |
          # Create a temp folder with the .app
          mkdir -p dmg_stage
          cp -r "dist/AI-Employee Bridge.app" dmg_stage/

          # Create a symlink to /Applications for drag-install UX
          ln -s /Applications dmg_stage/Applications

          # Build the .dmg using hdiutil (built-in macOS tool)
          hdiutil create \
            -volname "AI-Employee Bridge" \
            -srcfolder dmg_stage \
            -ov \
            -format UDZO \
            "../${{ steps.bridge_version.outputs.dmg_name }}"

      - name: Codesign .dmg
        if: steps.apple_signing.outputs.available == 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" "${{ steps.bridge_version.outputs.dmg_name }}"
          codesign --verify --verbose=2 "${{ steps.bridge_version.outputs.dmg_name }}"

      - name: Notarize .dmg
        if: steps.apple_signing.outputs.available == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool submit "${{ steps.bridge_version.outputs.dmg_name }}" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple "${{ steps.bridge_version.outputs.dmg_name }}"

      - name: Create legacy DMG alias
        run: |
          cp -f "${{ steps.bridge_version.outputs.dmg_name }}" AI-Employee-Bridge.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: AI-Employee-Bridge-macOS
          path: |
            ${{ steps.bridge_version.outputs.dmg_name }}
            AI-Employee-Bridge.dmg
          retention-days: 30

      - name: Remove stale bridge release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete-asset bridge-latest "${{ steps.bridge_version.outputs.dmg_name }}" --repo "$GITHUB_REPOSITORY" -y || true
          gh release delete-asset bridge-latest "AI-Employee-Bridge.dmg" --repo "$GITHUB_REPOSITORY" -y || true

      - name: Publish to bridge-latest release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: bridge-latest
          name: "Bridge — Latest Build"
          prerelease: true
          make_latest: false
          files: |
            ${{ steps.bridge_version.outputs.dmg_name }}
            AI-Employee-Bridge.dmg

  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: computer-use-bridge
        run: |
          pip install pyinstaller pystray pyautogui Pillow websockets edge-tts customtkinter

      - name: Set bridge version
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          $lines = @(
            '"""Generated during the bridge release build."""',
            '',
            "BRIDGE_VERSION = `"$version`""
          )
          Set-Content -Path computer-use-bridge\_version.py -Value $lines -Encoding UTF8

      - name: Build .exe with PyInstaller
        working-directory: computer-use-bridge
        run: |
          pyinstaller bridge_windows.spec --noconfirm --clean

      - name: Zip the executable
        working-directory: computer-use-bridge
        run: |
          Compress-Archive -Path dist\AI-Employee-Bridge.exe `
            -DestinationPath ..\AI-Employee-Bridge-Windows.zip
        shell: pwsh

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v7
        with:
          name: AI-Employee-Bridge-Windows
          path: AI-Employee-Bridge-Windows.zip
          retention-days: 30

      - name: Remove stale bridge release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete-asset bridge-latest "AI-Employee-Bridge-Windows.zip" --repo "$env:GITHUB_REPOSITORY" -y
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No stale Windows bridge asset to remove."
            $global:LASTEXITCODE = 0
          }
        shell: pwsh

      - name: Publish to bridge-latest release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: bridge-latest
          name: "Bridge — Latest Build"
          prerelease: true
          make_latest: false
          files: AI-Employee-Bridge-Windows.zip
